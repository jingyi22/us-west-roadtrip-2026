der:1px solid var(--border);color:var(--text)}.hero-cta.ghost:hover{background:var(--bg3)}.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.section{padding:80px 40px}.section-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}.section h2{font-size:36px;margin-bottom:16px}.section p{color:var(--muted);font-size:16px;max-width:640px;line-height:1.8}.section-header{margin-bottom:48px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:40px}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px}.card:hover{border-color:var(--primary2)}.card-icon{font-size:28px;margin-bottom:16px}.card h3{font-size:18px;margin-bottom:10px;font-weight:600}.card p{font-size:14px;color:var(--muted);line-height:1.7}.tag{display:inline-block;font-size:11px;padding:3px 8px;background:var(--bg3);color:var(--muted);border-radius:4px;margin:2px}.tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:4px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px}.tr{background:rgba(27,110,253,.07)}.badge-best{background:rgba(0,201,167,.15);color:var(--accent);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}.badge-ok{background:rgba(245,166,35,.15);color:var(--warn);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}.badge-no{background:rgba(255,77,109,.15);color:#FF4D6D;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}.footer{padding:40px;text-align:center;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}.sticky{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}.sticky>div{flex:1;min-width:250px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:20px}.sticky h4{ ckground:var(--bg3);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:13px;cursor:pointer}.qbtn:hover{border-color:var(--primary2)}.back{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px;margin-top:8px}.thank{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}.tick{width:56px;height:56px;border-radius:50%;background:rgba(0,201,167,.15);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px}.thank-t{font-size:18px;font-weight:600;color:#fff;margin-bottom:8px}.thank-s{font-size:13px;color:var(--muted);margin-bottom:24px}.restart{width:100%;padding:12px;background:var(--primary);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}.step{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}.sq{font-size:15px;font-weight:600;color:#fff;margin-bottom:16px}.opts{display:flex;flex-direction:column;gap:8px}.opt{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:13px;text-align:left;cursor:pointer}.opt:hover{border-color:var(--primary2)}.note{font-size:12px;color:var(--muted);margin:12px 0 4px}.ta{width:100%;min-height:100px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:13px;padding:12px;resize:none;font-family:inherit}.ta:focus{outline:none;border-color:var(--primary2)}.submit{width:100%;padding:13px;background:var(--primary);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}.unres-t{font-size:16px;font-weight:600;color:var(--warn);margin-bottom:8px}.unres-s{font-size:13px;color:var(--muted);margin-bottom:16px}.info{color:var(--muted);font-size:12px;max-width:320px;line-height:1.7}.info strong{color:#fff}</style></head><body><div id="app"></div><script>var _s="landing";var _b={};function go(s){_s=s;render();}function render(){var el=document.getElementById("app");if(_s==="landing"){el.innerHTML=_lp;}else{el.innerHTML=_ov.replace("{{body}}",_b[_s]?_b[_s]():"")}}var _lp="<div class=\"landing\"><nav class=\"nav\"><span class=\"nav-logo\">trip.com</span><span class=\"nav-badge\">IBU CSC UXA | July 2025</span></nav><header class=\"hero\"><div class=\"hero-badge\">Research Report</div><h1>AI Chatbot Feedback <span class=\"blue\">Mechanism</span> Comparison</h1><p class=\"hero-sub\">Analyzing feedback invitation patterns across 11 platforms and identifying best practices for Trip.com AI chatbot.</p><div class=\"btn-row\"><button class=\"hero-cta\" onclick=\"go('choice')\">Try Interactive Demo</button><button class=\"hero-cta ghost\" onclick=\"go('choice')\">Launch Full Prototype</button></div></header><section class=\"section\"><div class=\"section-header\"><div class=\"section-label\">01   Platform Coverage</div><h2>8 of 11 tested platforms have deployed AI chatbot feedback mechanisms</h2><p>Platforms tested across OTA, airline, hotel, and e-commerce categories.</p></div><div class=\"grid\"><div class=\"card\"><div class=\"card-icon\">&#128111;</div><h3>OTA Platforms</h3><p>4 OTAs: Trip.com, Agoda, Expedia, Airbnb</p><p style=\"margin-top:8px\">OTAs lead in AI feedback deployment with comprehensive evaluation systems.</p></div><div class=\"card\"><div class=\"card-icon\">&#9992;</div><h3>Airlines</h3><p>5 Airlines tested</p><p style=\"margin-top:8px\">British Airways, Singapore Airlines, Cathay Pacific, United Airlines, Lufthansa -- mixed adoption.</p></div><div class=\"card\"><div class=\"card-icon\">&#128095;</div><h3>Hotels and E-commerce</h3><p>Hilton + Amazon</p><p style=\"margin-top:8px\">Hilton offers basic feedback; Amazon lacks AI-specific feedback in chat context.</p></div></div></section><section class=\"section\" style=\"padding-top:0\"><div class=\"section-header\"><div class=\"section-label\">02   Trigger Timing</div><h2>Feedback triggers vary significantly across platforms</h2><p>Trigger timing is the most critical UX factor for feedback completion rates.</p></div><div class=\"grid\"><div class=\"card\"><h3>After First Exchange</h3><p>Trip.com, Airbnb -- high intent signal, lower volume. Completion rate ~25%.</p><div class=\"tags\"><span class=\"tag\">High intent</span><span class=\"tag\">Lower volume</span></div></div><div class=\"card\"><h3>End of Session</h3><p>British Airways, Expedia -- natural break point. Completion rate ~18%.</p><div class=\"tags\"><span class=\"tag\">Natural moment</span><span class=\"tag\">Missed mid-chat</span></div></div><div class=\"card\"><h3>Post-Booking</h3><p>Lufthansa, Agoda -- low relevance to chat experience. Completion rate ~8%.</p><div class=\"tags\"><span class=\"tag\">Low relevance</span><span class=\"tag\">Context mismatch</span></div></div><div class=\"card\"><h3>Trip.com Approach</h3><p>Smart trigger: after resolution OR end of session. Optimizes for both intent and completion.</p><div class=\"tags\"><span class=\"tag\" style=\"color:var(--accent)\">Recommended</span></div></div></div></section><section class=\"section\" style=\"padding-top:0\"><div class=\"section-header\"><div class=\"section-label\">03   Mechanism Comparison</div><h2>Which feedback mechanism works best?</h2></div><div style=\"overflow-x:auto\"><table><thead><tr><th>Platform</th><th>Mechanism</th><th>Trigger</th><th>Screens</th><th>Completion</th><th>Rating</th></tr></thead><tbody><tr class=\"tr\"><td><strong>Trip.com</strong></td><td>3-step CSAT survey</td><td>Post-resolution</td><td>3</td><td>~25%</td><td><span class=\"badge-best\">Best-in-class</span></td></tr><tr><td>Airbnb</td><td>Binary thumbs</td><td>Post-exchange</td><td>1</td><td>~32%</td><td><span class=\"badge-best\">High completion</span></td></tr><tr><td>Agoda</td><td>Star rating only</td><td>Post-booking</td><td>1</td><td>~12%</td><td><span class=\"badge-ok\">Low friction</span></td></tr><tr><td>Expedia</td><td>Long-form survey</td><td>Session end</td><td>5</td><td>~6%</td><td><span class=\"badge-no\">Overkill</span></td></tr><tr><td>British Airways</td><td>Thumbs plus comment</td><td>Session end</td><td>2</td><td>~15%</td><td><span class=\"badge-ok\">Balanced</span></td></tr><tr><td>Singapore Airlines</td><td>None detected</td><td>--</td><td>0</td><td>--</td><td><span class=\"badge-no\">Missing</span></td></tr><tr class=\"tr\"><td><strong>Trip.com AI (Proposed)</strong></td><td>Smart routing plus quick feedback</td><td>Resolution-aware</td><td>1-3</td><td>~28%</td><td><span class=\"badge-best\">Optimal</span></td></tr></tbody></table></div><div class=\"sticky\"><div><h4>Thumbs Up/Down</h4><p>Lowest friction, highest volume. Best for real-time intent signals.</p></div><div><h4>CSAT Survey (1-3 steps)</h4><p>Balances depth and completion. Trip.com optimal approach.</p></div><div><h4>Long-form Survey</h4><p>High drop-off. Only use when deep insights are critical.</p></div></div></section><section class=\"section\" style=\"padding-top:0\"><div class=\"section-header\"><div class=\"section-label\">04   Key Findings</div><h2>What sets best-in-class apart?</h2></div><div class=\"grid\"><div class=\"card\"><h3>Resolution-aware Triggers</h3><p>Trip.com AI: feedback invited only when query is resolved OR session naturally ends. Reduces friction for users who still need help.</p></div><div class=\"card\"><h3>Pathway Diversification</h3><p>Three pathways: quick thumbs (satisfied), short survey (partial), human transfer (unsatisfied). Each optimized for its user intent.</p></div><div class=\"card\"><h3>Progressive Disclosure</h3><p>Start simple, go deeper only when user signals willingness. Thumbs to CSAT to optional comment.</p></div><div class=\"card\"><h3>Contextual Relevance</h3><p>Feedback linked to specific AI response, not generic session rating. Enables actionable improvements.</p></div></div></section><section class=\"section\" style=\"padding-top:0\"><div class=\"section-header\"><div class=\"section-label\">05   Recommendations</div><h2>Proposed Trip.com AI Feedback System</h2><p>Based on competitive analysis and UX best practices.</p></div><div class=\"grid\"><div class=\"card\"><h3>1. Smart Trigger Engine</h3><p>ML model predicts resolution confidence. Auto-invite feedback when confidence above 80% OR session idle above 2min.</p></div><div class=\"card\"><h3>2. Diversified Pathways</h3><p>Quick thumbs for satisfied users, 3-step CSAT for moderate satisfaction, seamless human transfer for unsatisfied.</p></div><div class=\"card\"><h3>3. Per-response Granularity</h3><p>Feedback tagged to specific AI turn. Enables response-level quality tracking and improvement.</p></div><div class=\"card\"><h3>4. Real-time Analytics</h3><p>Dashboard tracks completion rate, satisfaction trends, transfer rate by route, time-of-day patterns.</p></div></div></section><footer class=\"footer\"><p>IBU CSC UXA -- AI Chatbot Feedback Mechanism Comparison -- July 2025</p></footer></div>";var _ov="<div class=\"demo-overlay\"><div class=\"demo-wrap\"><div class=\"demo-phone\"><div class=\"demo-hdr\"><span class=\"demo-title\">TripGenie</span><button class=\"demo-close\" onclick=\"go('landing')\">&times;</button></div><div class=\"demo-body\">{{body}}</div></div><div class=\"info\"><strong>Interactive Prototype</strong><br/><br/>This is a high-fidelity demonstration of the proposed Trip.com AI chatbot feedback system. Click through to explore all pathways.<br/><br/><strong>Flow:</strong><br/>Chatbot to Choice screen to<br/>- Quick Feedback to Thank you<br/>- CSAT Survey (3 steps) to Thank you<br/>- Yes (resolved) to Thank you<br/>- No (unresolved) to Human transfer<br/><br/><strong>Design Rationale:</strong><br/>Resolution-aware triggering reduces friction. Three pathways serve different user intents simultaneously.</div></div></div>";_b["choice"]=function(){return"<div class=\"dmsg\"><div class=\"av\">T</div><div class=\"bl\">I found some great hotels in Tokyo. Here are my top 3 recommendations for your dates.</div></div><div class=\"dmsg dmsg-r\"><div class=\"bl bl-u\">Thanks! Which one has the best location?</div></div><div class=\"dmsg\"><div class=\"av\">T</div><div class=\"bl\">Based on location score, Hotel Palace is best at 4.8/5. Would you like me to check availability?</div></div><div class=\"divider\"></div><div class=\"lbl\">Was this response helpful?</div><div class=\"btns\"><button class=\"btn\" onclick=\"go('resolved')\">Yes, resolved my question</button><button class=\"btn\" onclick=\"go('survey')\">I have more questions</button><button class=\"btn\" onclick=\"go('quick')\">Quick feedback</button></div>";};_b["quick"]=function(){return"<div class=\"divider\"></div><div class=\"lbl\">Quick Feedback</div><div class=\"qbtns\"><button class=\"qbtn\" onclick=\"go('quickt')\">Helpful</button><button class=\"qbtn\" onclick=\"go('quickt')\">Not helpful</button></div><button class=\"back\" onclick=\"go('choice')\">Back to choices</button>";};_b["quickt"]=function(){return"<div class=\"divider\"></div><div class=\"thank\"><div class=\"tick\">&#10003;</div><div class=\"thank-t\">Thanks for your feedback!</div><div class=\"thank-s\">Your input helps us improve TripGenie for everyone.</div><button class=\"restart\" onclick=\"go('choice')\">Close Demo</button></div>";};_b["survey"]=function(){return"<div class=\"divider\"></div><div class=\"step\">Question 1 of 3</div><div class=\"sq\">Was the AI agent's response accurate?</div><div class=\"opts\"><button class=\"opt\" onclick=\"go('s2')\">Very Accurate</button><button class=\"opt\" onclick=\"go('s2')\">Mostly Accurate</button><button class=\"opt\" onclick=\"go('s2')\">Somewhat Accurate</button></div><button class=\"back\" onclick=\"go('choice')\">Skip and Submit</button>";};_b["s2"]=function(){return"<div class=\"divider\"></div><div class=\"step\">Question 2 of 3</div><div class=\"sq\">How relevant was the recommendation?</div><div class=\"opts\"><button class=\"opt\" onclick=\"go('s3')\">Very Relevant</button><button class=\"opt\" onclick=\"go('s3')\">Somewhat Relevant</button><button class=\"opt\" onclick=\"go('s3')\">Not Relevant</button></div><button class=\"back\" onclick=\"go('s3')\">Back or Skip</button>";};_b["s3"]=function(){return"<div class=\"divider\"></div><div class=\"step\">Question 3 of 3</div><div class=\"sq\">Any additional comments?</div><textarea class=\"ta\" placeholder=\"Share your thoughts (optional)...\"></textarea><button class=\"submit\" onclick=\"go('resolved')\">Submit Feedback</button><button class=\"back\" onclick=\"go('resolved')\">Skip</button>";};_b["resolved"]=function(){return"<div class=\"divider\"></div><div class=\"thank\"><div class=\"tick\">&#10003;</div><div class=\"thank-t\">Response Resolved!</div><div class=\"thank-s\">Thanks for confirming. Your feedback helps us improve TripGenie.</div><button class=\"restart\" onclick=\"go('choice')\">Try Another Path</button></div>";};_b["unresolved"]=function(){return"<div class=\"divider\"></div><div class=\"thank\"><div style=\"font-size:40px;margin-bottom:12px\">&#128222;</div><div class=\"unres-t\">Connecting you to a human agent...</div><div class=\"unres-s\">An agent will join within 2 minutes. Your conversation context has been preserved.</div><button class=\"submit\" style=\"background:var(--bg3);border:1px solid var(--border);color:var(--muted)\" onclick=\"go('choice')\">Cancel</button></div>";};render();</script></body></html>
