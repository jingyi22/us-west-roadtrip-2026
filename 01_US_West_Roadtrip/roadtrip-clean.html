<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美西自驾环线 2026 · 9月24日-10月5日</title>
<style>
:root{--p:#1a6b8a;--s:#2980b9;--bg:#f5f7fa;--t:#333;--tl:#888;--pd:#1a3a4a;--bd:#dde3ea;--r:16px;--sh:0 4px 16px rgba(0,0,0,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);line-height:1.7}
.hero{background:linear-gradient(135deg,#0d4f6b,#1a6b8a 40%,#2980b9 80%,#6dd5fa);color:#fff;padding:56px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;opacity:0.05;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23fff'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.badge{display:inline-block;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.3);border-radius:50px;padding:5px 18px;font-size:12px;margin-bottom:14px;letter-spacing:2px;text-transform:uppercase}
.hero h1{font-size:clamp(24px,5vw,42px);font-weight:800;margin-bottom:6px}
.hero .sub{font-size:15px;opacity:0.9;margin-bottom:18px}
.stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:18px}
.stat{text-align:center}
.stat .n{font-size:26px;font-weight:800}
.stat .l{font-size:11px;opacity:0.8;text-transform:uppercase;letter-spacing:1px}
.tabs{display:flex;gap:3px;padding:12px 12px 0;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px;border:none;background:transparent;border-radius:10px 10px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--tl);transition:all .2s}
.tab:hover{color:var(--p);background:rgba(26,107,138,0.06)}
.tab.active{background:var(--p);color:#fff}
.sec{display:none;padding:20px 14px 60px;max-width:940px;margin:0 auto}
.sec.active{display:block}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:14px;border:1px solid var(--bd)}
.card h2{font-size:17px;font-weight:700;color:var(--pd);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .ic{width:32px;height:32px;background:linear-gradient(135deg,var(--p),#2980b9);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.card h3{font-size:14px;font-weight:700;color:var(--pd);margin:12px 0 7px}
.card h3:first-child{margin-top:0}
.day{border:1px solid var(--bd);border-radius:13px;margin-bottom:10px;overflow:hidden;background:#fff;transition:box-shadow .2s}
.day:hover{box-shadow:0 4px 20px rgba(26,107,138,0.12)}
.dh{padding:15px 17px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.dl{display:flex;align-items:center;gap:11px}
.dn{width:38px;height:38px;background:linear-gradient(135deg,var(--p),#5dade2);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.dn.r{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.dn.w{background:linear-gradient(135deg,#e67e22,#e74c3c)}
.di .dt{font-weight:700;font-size:13px;color:var(--t)}
.di .ds{font-size:11px;color:var(--tl);margin-top:1px}
.da{width:22px;height:22px;border:none;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s;color:var(--tl);font-size:12px;flex-shrink:0}
.day.open .da{transform:rotate(180deg)}
.db{max-height:0;overflow:hidden;transition:max-height .4s ease}
.day.open .db{max-height:5000px}
.dc{padding:0 17px 17px;border-top:1px solid var(--bd);padding-top:13px}
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--p),#5dade2);border-radius:2px}
.ti{position:relative;margin-bottom:13px}
.ti::before{content:'';position:absolute;left:-18px;top:5px;width:10px;height:10px;background:#fff;border:3px solid var(--p);border-radius:50%;z-index:1}
.ti.h::before{border-color:#f39c12;background:#f39c12}
.ti .tm{font-size:11px;color:var(--tl);font-weight:600;margin-bottom:2px}
.ti .tp{font-size:13px;font-weight:700;color:var(--t)}
.ti .tp a{color:var(--p);text-decoration:underline}
.ti .td{font-size:11px;color:var(--tl);margin-top:2px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ii{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg);border-radius:8px;font-size:12px}
.ii .ic{font-size:16px;flex-shrink:0}
.ii .lb{font-weight:600;color:var(--t)}
.ii .vl{color:var(--tl);margin-left:auto}
.rb{display:flex;align-items:center;gap:4px;overflow-x:auto;padding:10px 0;scrollbar-width:none}
.rb::-webkit-scrollbar{display:none}
.rb .rn{flex-shrink:0;text-align:center;min-width:42px}
.rb .rn .dt{width:26px;height:26px;background:var(--p);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto 4px}
.rb .rn .lb{font-size:9px;color:var(--tl);line-height:1.2}
.rb .rs{flex:1;height:3px;background:linear-gradient(to right,var(--p),#5dade2);border-radius:2px;min-width:12px}
.wb{display:flex;gap:10px;padding:11px 13px;background:var(--bg);border-radius:10px;font-size:12px}
.wb .ic{font-size:18px;flex-shrink:0}
.wb .tx{flex:1}
.wb .tt{font-weight:700;margin-bottom:2px}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ac{display:flex;align-items:center;gap:9px;padding:11px;background:var(--bg);border-radius:11px;border:1px solid var(--bd);text-decoration:none;color:var(--t);transition:all .2s}
.ac:hover{background:#fff;border-color:var(--p)}
.ai{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.an{font-weight:700;font-size:13px}
.ad{font-size:11px;color:var(--tl)}
.wx{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:8px}
.wx-card{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid var(--bd)}
.wx-card .ct{font-size:12px;font-weight:700;margin-bottom:4px}
.wx-card .ic{font-size:24px;margin:4px 0}
.wx-card .tp{font-size:18px;font-weight:800;color:var(--p)}
.wx-card .rn{font-size:11px;color:var(--tl)}
.wx-card.nt{background:#fff8f0;border-color:#f39c12}
.cl{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.cc{background:var(--bg);border-radius:12px;padding:14px;text-align:center}
.cc .em{font-size:28px}
.cc .nm{font-weight:700;font-size:13px;margin:6px 0 2px}
.cc .ds{font-size:10px;color:var(--tl)}
.cc .tp{font-size:12px;font-weight:600;color:var(--p);margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--p);color:#fff;padding:7px 9px;text-align:left;font-weight:700}
th:first-child{border-radius:8px 0 0 0}
th:last-child{border-radius:0 8px 0 0}
td{padding:7px 9px;border-bottom:1px solid var(--bd)}
tr:nth-child(even){background:var(--bg)}
.ft{text-align:center;padding:28px 20px;background:var(--pd);color:rgba(255,255,255,0.5);font-size:11px}
.ft span{display:block;margin-top:4px}
#route-map{height:380px;width:100%;border-radius:12px}
</style>
</head>
<body>
<div class="hero">
  <div class="badge">✈ 行程规划 2026</div>
  <h1>🇺🇸 美西自驾环线</h1>
  <p class="sub">9月24日 - 10月5日 · 11天10夜 · 约2,800英里</p>
  <div class="stats">
    <div class="stat"><div class="n">11</div><div class="l">天</div></div>
    <div class="stat"><div class="n">2,800</div><div class="l">英里</div></div>
    <div class="stat"><div class="n">3</div><div class="l">条景观公路</div></div>
    <div class="stat"><div class="n">12+</div><div class="l">海滩/景点</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('overview')">📋 概览</button>
  <button class="tab" onclick="showTab('route')">🗺️ 路线</button>
  <button class="tab" onclick="showTab('daily')">📅 每日</button>
  <button class="tab" onclick="showTab('weather')">🌡️ 气温</button>
  <button class="tab" onclick="showTab('clothes')">👕 穿衣</button>
  <button class="tab" onclick="showTab('mexico')">🇲🇽 边境</button>
  <button class="tab" onclick="showTab('apps')">📱 App</button>
</div>
