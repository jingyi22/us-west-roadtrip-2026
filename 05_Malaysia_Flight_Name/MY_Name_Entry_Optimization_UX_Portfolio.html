// ─── NameEntryScreen ────────────────────────────────────────────────────────
function NameEntryScreen({ onContinue, accent }) {
  const [gender, setGender] = useState('female');
  const [given, setGiven] = useState('SITI NUR AISYAH');
  const [family, setFamily] = useState('BINTI AHMAD KAMIL');
  const [ethnic, setEthnic] = useState('malay');
  const [showEx, setShowEx] = useState(false);
  const [validation, setValidation] = useState(null);
  const [shakeKey, setShakeKey] = useState(0);
  const [demoState, setDemoState] = useState('idle');
  const [showScan, setShowScan] = useState(false);

  const validate = (g, fn) => {
    const low = fn.toLowerCase();
    const hasBin = /\bbin\b/.test(low);
    const hasBinti = /\bbinti\b/.test(low);
    if (g === 'female' && hasBin && !hasBinti) return 'gender_mismatch';
    if (g === 'male' && hasBinti) return 'gender_mismatch';
    return fn.length > 0 ? 'ok' : null;
  };

  const handleFamily = (val) => {
    const v = val.toUpperCase();
    setFamily(v);
    const result = validate(gender, v);
    setValidation(result);
    if (demoState === 'triggered') setDemoState(result === 'ok' ? 'fixed' : 'triggered');
  };

  const triggerDemo = () => {
    setGender('female');setFamily('BIN AHMAD KAMIL');
    setValidation('gender_mismatch');setShakeKey((k) => k + 1);setDemoState('triggered');
  };

  const ex = ETHNIC[ethnic];

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: '#F5F7FA', overflow: 'hidden', position: 'relative' }}>
      <StatusBar dark={false} />

        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: '#111827', letterSpacing: -.3 }}>Traveller 1 Details</div>

// ─── PassportScanModal ──────────────────────────────────────────────────────
function PassportScanModal({ onClose, onApply, accent }) {
  const [phase, setPhase] = useState('scanning');
  const [pGiven, setPGiven] = useState('');
  const [pFamily, setPFamily] = useState('');
  const G = 'SITI NUR AISYAH',F = 'BINTI AHMAD KAMIL';

  useEffect(() => {
    const t1 = setTimeout(() => {
      setPhase('parsed');
      let i = 0;const ti = setInterval(() => {i++;setPGiven(G.slice(0, i));if (i >= G.length) clearInterval(ti);}, 55);
      let j = 0;const tj = setInterval(() => {j++;setPFamily(F.slice(0, j));if (j >= F.length) clearInterval(tj);}, 55);
    }, 1700);
    const t2 = setTimeout(() => setPhase('done'), 4000);
    return () => {clearTimeout(t1);clearTimeout(t2);};
  }, []);

  return (
    <div className="a-fade" style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,.87)', zIndex: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div className="a-slide-up" style={{ background: '#1A1B22', borderRadius: 20, padding: 18, width: '100%', maxWidth: 340 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'white' }}>Scan Passport MRZ</div>
          <button onClick={onClose} style={{ background: 'rgba(255,255,255,.1)', border: 'none', borderRadius: 8, color: 'white', fontSize: 12, padding: '4px 10px', cursor: 'pointer' }}>✕ Close</button>
        </div>
        <div style={{ position: 'relative', background: '#1E2E4A', borderRadius: 12, padding: 14, marginBottom: 14, overflow: 'hidden', minHeight: 150 }}>
          <div style={{ fontSize: 9, color: 'rgba(255,255,255,.35)', letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 8 }}>MALAYSIA · PASPORT</div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
            <div style={{ width: 44, height: 56, background: 'rgba(255,255,255,.1)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 22 }}>👤</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
              <div style={{ height: 7, background: 'rgba(255,255,255,.2)', borderRadius: 4, width: 90 }} />
              <div style={{ height: 5, background: 'rgba(255,255,255,.1)', borderRadius: 4, width: 70 }} />
              <div style={{ height: 5, background: 'rgba(255,255,255,.1)', borderRadius: 4, width: 55 }} />
            </div>
          </div>
          <div style={{ background: '#111B2E', borderRadius: 6, padding: '8px 10px', border: `1px solid ${phase !== 'scanning' ? '#48BB78' : 'transparent'}`, transition: 'border-color .5s' }}>
            <div style={{ fontFamily: 'Courier New,monospace', fontSize: 9, color: '#90CDF4', letterSpacing: 1, lineHeight: 1.7 }}>
              <div>P&lt;MYSSITIINUR&lt;AISYAH&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</div>
              <div>A12345678&lt;MYS8801214F2601019&lt;&lt;&lt;&lt;2</div>
            </div>
          </div>
          {phase === 'scanning' && <div style={{ position: 'absolute', left: 0, right: 0, height: 2, background: `linear-gradient(90deg,transparent,${accent},transparent)`, animation: 'scanLine 1.6s ease-in-out infinite', boxShadow: `0 0 10px ${accent}` }} />}
          {phase !== 'scanning' && <div style={{ position: 'absolute', bottom: 14, right: 14, background: '#48BB78', borderRadius: 20, padding: '3px 9px', fontSize: 9, color: 'white', fontWeight: 600 }}>✓ MRZ Parsed</div>}
        </div>
        {phase !== 'scanning' &&
        <div className="a-fsi" style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,.4)', marginBottom: 8 }}>Fields extracted from MRZ:</div>
            {[['Nama Pemberian (Given Name)', pGiven], ['Nama Keluarga (Family Name)', pFamily]].map(([l, v]) =>
          <div key={l} style={{ background: 'rgba(255,255,255,.06)', borderRadius: 10, padding: '9px 11px', marginBottom: 7 }}>
                <div style={{ fontSize: 9, color: 'rgba(255,255,255,.35)', marginBottom: 4 }}>{l}</div>

              </div>
          )}
          </div>
        }
        {phase === 'done' && <button className="a-pop" onClick={() => onApply(G, F)} style={{ width: '100%', padding: '13px', borderRadius: 12, border: 'none', background: '#48BB78', color: 'white', fontSize: 13, fontWeight: 700, cursor: 'pointer', animation: 'confirmPulse 2s ease-in-out infinite' }}>Apply to Form ✓</button>}

      </div>
    </div>);

}

                {confirmed ? <><span className="a-pop" style={{ fontSize: 15 }}>✓</span>Confirmed!</> : 'Confirm & Continue →'}

          </div>
        }
      </div>
    </div>);

}

            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3 }}>
              <div style={{ fontSize: 9, color: '#9CA3AF' }}>AK 721 · 21 Jul 2025</div>

                <div style={{ flex: 1, height: 1, background: '#E5E7EB' }} /><span style={{ color: '#9CA3AF', fontSize: 13 }}>✈</span><div style={{ flex: 1, height: 1, background: '#E5E7EB' }} />

            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: '#92400E' }}>Name Verification Reminder</div>

          <div style={{ marginTop: 8, fontSize: 9, color: '#9CA3AF', lineHeight: 1.4 }}>✦ <em>Improvement: Added between order placement & ticket issuance — critical free-correction window per research</em></div>
        </div>
        <div className="a-fsi" style={{ animationDelay: '.3s', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 9, marginBottom: 12 }}>
          {[['View Booking', '🗓', true], ['Download App', '📱', false]].map(([l, ic, p]) =>
          <button key={l} style={{ padding: '13px 8px', borderRadius: 12, border: `1.5px solid ${p ? accent : '#E5E7EB'}`, background: p ? '#EEF3FF' : 'white', color: p ? accent : '#374151', fontSize: 12, fontWeight: 600, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>

          <button onClick={onRestart} style={{ background: 'none', border: '1px solid #E5E7EB', borderRadius: 10, padding: '9px 18px', color: '#6B7280', fontSize: 12, cursor: 'pointer', fontWeight: 500 }}>↩ Restart Demo</button>
        </div>
      </div>
    </div>);

}

// ─── PhoneFrame ─────────────────────────────────────────────────────────────
function PhoneFrame({ children, scale }) {
  return (
    <div style={{ position: 'relative', flexShrink: 0, transform: `scale(${scale})`, transformOrigin: 'center center', filter: 'drop-shadow(0 28px 60px rgba(0,0,0,.6))' }}>
      <div style={{ position: 'absolute', inset: -11, borderRadius: 54, background: 'linear-gradient(145deg,#2C2C2E,#0A0A0A)', boxShadow: 'inset 0 0 0 1px rgba(255,255,255,.07),0 0 0 1px rgba(0,0,0,.6)' }} />
      <div style={{ position: 'absolute', left: -14, top: 170, width: 4, height: 32, background: '#1A1A1A', borderRadius: '2px 0 0 2px' }} />
      <div style={{ position: 'absolute', left: -14, top: 215, width: 4, height: 32, background: '#1A1A1A', borderRadius: '2px 0 0 2px' }} />
      <div style={{ position: 'absolute', right: -14, top: 200, width: 4, height: 62, background: '#1A1A1A', borderRadius: '0 2px 2px 0' }} />
      <div style={{ position: 'relative', borderRadius: 44, overflow: 'hidden', width: 390, height: 780, background: '#F5F7FA', display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
    </div>);

}

// ─── AnnotationCard ──────────────────────────────────────────────────────────
function AnnotationCard({ title, body, research, delay }) {
  return (
    <div className="ann" style={{ animationDelay: `${delay}s` }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: '#93C5FD', marginBottom: 4 }}>{title}</div>
      <div style={{ fontSize: 11, color: 'rgba(255,255,255,.7)', lineHeight: 1.5, marginBottom: 6 }}>{body}</div>
      <div style={{ fontSize: 10, color: 'rgba(255,255,255,.3)', lineHeight: 1.4, borderTop: '1px solid rgba(255,255,255,.07)', paddingTop: 5 }}>📊 {research}</div>
    </div>);

}

// ─── TweaksPanel ─────────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, onUpdate, onClose }) {
  return (
    <div style={{ position: 'fixed', bottom: 22, right: 22, background: '#1A1B22', border: '1px solid rgba(255,255,255,.1)', borderRadius: 16, padding: 18, width: 270, zIndex: 1000, boxShadow: '0 20px 60px rgba(0,0,0,.55)', animation: 'slideUp .3s ease' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: 'white' }}>Tweaks</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,.4)', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
      </div>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 10, color: 'rgba(255,255,255,.4)', textTransform: 'uppercase', letterSpacing: .5, marginBottom: 8 }}>Accent Color</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {['#1B6EFD', '#7C3AED', '#059669', '#DC2626', '#D97706'].map((c) =>
          <button key={c} onClick={() => onUpdate({ accentColor: c })} style={{ width: 26, height: 26, borderRadius: 8, background: c, border: 'none', cursor: 'pointer', outline: tweaks.accentColor === c ? '2.5px solid white' : 'none', outlineOffset: 2 }} />
          )}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 10, color: 'rgba(255,255,255,.4)', textTransform: 'uppercase', letterSpacing: .5, marginBottom: 8 }}>Annotations</div>
        <button onClick={() => onUpdate({ showAnnotations: !tweaks.showAnnotations })} style={{ padding: '6px 13px', borderRadius: 8, border: 'none', background: tweaks.showAnnotations ? tweaks.accentColor : 'rgba(255,255,255,.1)', color: 'white', fontSize: 11, cursor: 'pointer', fontWeight: 500 }}>
          {tweaks.showAnnotations ? 'Visible ✓' : 'Hidden'}
        </button>
      </div>
    </div>);

}

// ─── Annotations per screen ──────────────────────────────────────────────────
const LEFT_ANNS = {
  'name-entry': [
  { title: 'Terminology Localization', body: '"Given Name" replaces "First Name" to match Malaysian naming conventions — reduces confusion from Western field labels.', research: '19.13% name reversal rate · Internal data analysis' },
  { title: 'Prefix Reminder', body: 'Explicit in-form reminder to include bin/binti/A/L/A/P as shown on passport.', research: '23.87% of amendments due to missing Malay prefixes' }],

  verification: [{ title: 'Boarding Denial Warning', body: 'Explicit risk statement added — "incorrect names may result in denied boarding." Traveloka & MH do this; Trip.com did not.', research: 'Competitive gap identified vs. Traveloka' }],
  success: [{ title: 'Post-Order Reminder', body: 'Name reminder added between order placement and ticket issuance — the critical free-correction window.', research: 'Internal interviews: most errors discovered at reconfirmation stage' }]
};
const RIGHT_ANNS = {
  'name-entry': [
  { title: 'Multi-ethnic Examples', body: 'Malay/Chinese/Indian passport format guidance, aligned with field order. Covers 31.55% prefix-related errors.', research: 'Competitive gap vs. Malaysia Airlines & AirAsia' },
  { title: 'Smart Validation', body: 'Real-time bin/binti gender mismatch detection — guides without blocking submission.', research: '1.55% of amendments from bin/binti gender errors' }],

  verification: [{ title: 'Action-oriented CTA', body: '"Confirm & Continue" replaces "Verify" — clearer intent, more decisive user action.', research: 'UX writing improvement from internal interview insight' }],
  success: [{ title: 'Labeled Name Fields', body: 'Given / Family name displayed with labels for passport cross-checking — not as one merged string.', research: 'P0 quick win — low effort, high clarity impact' }]
};

const STEP_INFO = {
  cover: { n: '01', label: 'Project Overview' },
  'name-entry': { n: '02', label: 'Name Entry Redesign' },
  verification: { n: '03', label: 'Pre-payment Verification' },
  success: { n: '04', label: 'Post-booking Reminder' }
};

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useLS('my-portfolio-screen', 'cover');
  const [tweaks, setTweaks] = useState({ ...TWEAK_DEFAULTS });
  const [showTweaks, setShowTweaks] = useState(false);
  const [phoneScale, setPhoneScale] = useState(1);
  const accent = tweaks.accentColor;

  useEffect(() => {
    const calc = () => {
      const sh = Math.min(1, (window.innerHeight - 180) / 780);
      const sw = Math.min(1, (window.innerWidth - (tweaks.showAnnotations ? 520 : 60)) / 390);
      setPhoneScale(Math.min(sh, sw, 1));
    };
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, [tweaks.showAnnotations]);

  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const updateTweaks = (partial) => {
    const next = { ...tweaks, ...partial };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: next.accentColor, showAnnotations: next.showAnnotations } }, '*');
  };

  const leftAnns = tweaks.showAnnotations && LEFT_ANNS[screen] || [];
  const rightAnns = tweaks.showAnnotations && RIGHT_ANNS[screen] || [];
  const info = STEP_INFO[screen] || STEP_INFO.cover;

  return (
    <div style={{ width: '100vw', height: '100vh', fontFamily: 'Inter,sans-serif', overflow: 'hidden' }}>
      {/* ── Cover: full-page ── */}
      {screen === 'cover' &&
      <div key="cover" style={{ width: '100%', height: '100%', animation: 'fadeSlideIn .5s ease both', position: 'relative' }}>
          <CoverScreen onStart={() => setScreen('name-entry')} accent={accent} />
          <div style={{ position: 'absolute', bottom: 24, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8, zIndex: 10 }}>
            {SCREENS.map((s) =>
          <button key={s} onClick={() => setScreen(s)} style={{ width: screen === s ? 26 : 8, height: 8, borderRadius: 4, background: screen === s ? accent : 'rgba(255,255,255,.15)', border: 'none', cursor: 'pointer', padding: 0, transition: 'all .3s ease' }} />
          )}
          </div>
        </div>
      }

      {/* ── Prototype: phone + annotations ── */}
      {screen !== 'cover' &&
      <div key="proto" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%', height: '100%', animation: 'fadeSlideIn .4s ease both' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12, marginTop: 16, flexShrink: 0 }}>
            <div style={{ background: 'rgba(255,255,255,.05)', borderRadius: 20, padding: '3px 11px', fontSize: 10, color: 'rgba(255,255,255,.4)', fontWeight: 500 }}>UX Design Portfolio</div>
            <div style={{ width: 3, height: 3, borderRadius: '50%', background: 'rgba(255,255,255,.15)' }} />
            <div style={{ background: 'rgba(255,255,255,.05)', borderRadius: 20, padding: '3px 11px', fontSize: 10, color: 'rgba(255,255,255,.4)', fontWeight: 500 }}>Malaysia Market · Trip.com</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 24, width: '100%', maxWidth: 1100, padding: '0 16px', flex: 1, justifyContent: 'center' }}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'flex-end', minWidth: 180 }}>
              {leftAnns.map((a, i) => <AnnotationCard key={i} {...a} delay={.08 + i * .1} />)}
            </div>
            <PhoneFrame scale={phoneScale}>
              {screen === 'name-entry' && <NameEntryScreen onContinue={() => setScreen('verification')} accent={accent} />}
              {screen === 'verification' && <VerificationScreen onBack={() => setScreen('name-entry')} onConfirm={() => setScreen('success')} accent={accent} />}
              {screen === 'success' && <SuccessScreen onRestart={() => setScreen('cover')} accent={accent} />}
            </PhoneFrame>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'flex-start', minWidth: 180 }}>
              {rightAnns.map((a, i) => <AnnotationCard key={i} {...a} delay={.12 + i * .1} />)}
            </div>
          </div>
          <div style={{ marginBottom: 16, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7, flexShrink: 0 }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              {SCREENS.map((s) =>
            <button key={s} onClick={() => setScreen(s)} style={{ width: screen === s ? 26 : 8, height: 8, borderRadius: 4, background: screen === s ? accent : 'rgba(255,255,255,.18)', border: 'none', cursor: 'pointer', padding: 0, transition: 'all .3s ease' }} />
            )}
              <span style={{ fontSize: 10, color: accent, fontWeight: 600, marginLeft: 6 }}>{info.n} / 04 · {info.label}</span>
            </div>
            <div key={screen} style={{ fontSize: 11, color: 'rgba(255,255,255,.3)', textAlign: 'center', maxWidth: 380, lineHeight: 1.55, animation: 'fadeSlideIn .4s ease both' }}>
              {screen === 'name-entry' && 'Improved terminology · multi-ethnic examples · smart prefix validation · MRZ scan guidance'}
              {screen === 'verification' && 'Toggle Before / After to compare — boarding denial warning and clearer CTA added'}
              {screen === 'success' && 'Name reminder between order placement and ticket issuance — critical free-correction window'}
            </div>
          </div>
        </div>
      }
      {showTweaks && <TweaksPanel tweaks={tweaks} onUpdate={updateTweaks} onClose={() => setShowTweaks(false)} />}
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
