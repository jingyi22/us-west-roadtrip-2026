<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;overflow:hidden}
body{background:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px) 0 0/48px 48px,linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px) 0 0/48px 48px,radial-gradient(ellipse at 50% 40%,#161825 0%,#0C0D12 100%)}
#root{height:100vh;display:flex;align-items:center;justify-content:center}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.3) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes confirmPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.016)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounceIn{0%{transform:scale(.2);opacity:0}55%{transform:scale(1.1)}75%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes floatIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes variantIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.a-fsi{animation:fadeSlideIn .45s ease-out both}
.a-pop{animation:popIn .6s cubic-bezier(.175,.885,.32,1.275) both}
.a-slide-up{animation:slideUp .35s cubic-bezier(.4,0,.2,1) both}
.a-fade{animation:fadeIn .3s ease both}
.a-bounce{animation:bounceIn .65s cubic-bezier(.175,.885,.32,1.275) both}
.a-vi{animation:variantIn .5s cubic-bezier(.16,1,.3,1) both}
.scroll{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.ann{background:rgba(27,110,253,.07);border:1px solid rgba(27,110,253,.18);border-radius:12px;padding:12px 14px;max-width:200px;animation:floatIn .5s ease both}

<script type="text/babel">

// ─── SVG Icon System (anti-emoji, anti-slop) ────────────────────────────────
const Ic = {

  ),

      <path d="M10 3L2.5 17h15L10 3z"/><path d="M10 11V8"/><circle cx="10" cy="14" r=".8" fill={c} stroke="none"/>
    </svg>
  ),
  Plane: ({s=14,c='currentColor'}) => (

      <path d="M17.5 9.5l-3-3-7.5 3-3-3L2 8.5 5 11l-1 4 1.5.5L7 12l3 1.5v3.5l1.5.5.5-4.5 5.5-3.5z"/>

  Refresh: ({s=14,c='currentColor'}) => (

      <path d="M3.5 10a6.5 6.5 0 0011.07-4.6M16.5 10a6.5 6.5 0 01-11.07 4.6"/><path d="M3.5 6V10h4"/>

  Star: ({s=14,c='currentColor',fill='none'}) => (
    <svg width={s} height={s} viewBox="0 0 20 20" fill={fill} stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M10 2.5l2.2 5H17l-3.9 3 1.5 5L10 13l-4.6 2.5 1.5-5L3 7.5h4.8L10 2.5z"/>
    </svg>
  ),
  ChevronDown: ({s=14,c='currentColor'}) => (
    <svg width={s} height={s} viewBox="0 0 20 20" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round">

};

// ─── Flight data ─────────────────────────────────────────────────────────────
const FLIGHTS = [
  { id:'ak721', airline:'AirAsia', code:'AK', num:'721', logoColor:'#FF0000', logoText:'AK',
    from:'KUL', to:'SIN', dep:'07:15', arr:'08:25', duration:'1h 10m',
    stops:0, price:89, tag:'Cheapest', tagColor:'#1B6EFD',
    baggage:'none', cancellation:false, verified:true, recommended:false },
  { id:'mh720', airline:'Malaysia Airlines', code:'MH', num:'720', logoColor:'#003580', logoText:'MH',
    from:'KUL', to:'SIN', dep:'10:30', arr:'11:40', duration:'1h 10m',
    stops:0, price:134, tag:'Best Value', tagColor:'#059669',
    baggage:'carry-on', cancellation:true, verified:true, recommended:true },
  { id:'od901', airline:'Batik Air', code:'OD', num:'901', logoColor:'#C8922A', logoText:'OD',
    from:'KUL', to:'SIN', dep:'14:00', arr:'17:40', duration:'3h 40m',
    stops:1, stopCity:'KUL', layover:'2h 0m', price:76, tag:null,
    baggage:'checked', cancellation:false, verified:true, recommended:false },
];

const FARE_FEATURES = ['Carry-on Bag','Checked Bag (20kg)','Seat Selection','Changes','Refund'];
const FARE_TIERS = [
  { id:'basic', name:'Basic', delta:0, values:[false,false,'fee',false,false] },
  { id:'standard', name:'Standard', delta:28, recommended:true, values:[true,false,true,'fee',false] },
  { id:'flex', name:'Flex', delta:65, values:[true,true,true,true,true] },
];

const SCREENS = ['cover','variants','search','fare-select','confirm'];

function useLS(key,init) {
  const [v,setV] = useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const set = useCallback((x)=>{setV(x);try{localStorage.setItem(key,JSON.stringify(x));}catch{}}, [key]);
  return [v,set];
}

// ─── StatusBar ────────────────────────────────────────────────────────────────
function StatusBar({dark}) {
  const c = dark ? '#fff' : '#111827';
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px 0',height:44,position:'relative',zIndex:10,flexShrink:0}}>
      <span style={{fontSize:15,fontWeight:600,color:c,letterSpacing:-.3}}>9:41</span>
      <div style={{position:'absolute',left:'50%',top:6,transform:'translateX(-50%)',background:dark?'rgba(0,0,0,.6)':'#111',borderRadius:20,width:118,height:30,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:'#222'}}/><div style={{width:5,height:5,borderRadius:'50%',background:'#333'}}/>
      </div>
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="8" width="3" height="4" rx="1" fill={c}/><rect x="4.5" y="5" width="3" height="7" rx="1" fill={c}/><rect x="9" y="2" width="3" height="10" rx="1" fill={c}/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill={c} opacity=".3"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2.5" stroke={c} strokeWidth="1.2" fill="none"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill={c} opacity=".4"/><rect x="1.5" y="2.5" width="15" height="7" rx="1.5" fill={c}/></svg>
      </div>
    </div>
  );
}

// ─── Airline Badge ────────────────────────────────────────────────────────────
function AirlineBadge({flight,size=30}) {
  return (
    <div style={{width:size,height:size,borderRadius:size*.25,background:flight.logoColor,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <span style={{fontSize:size*.32,fontWeight:800,color:'white',letterSpacing:-.5}}>{flight.logoText}</span>
    </div>
  );
}

// ─── Stop Timeline ────────────────────────────────────────────────────────────
function StopTimeline({flight}) {
  const isStop = flight.stops > 0;
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
      <span style={{fontSize:10,color:'#9CA3AF'}}>{flight.duration}</span>
      <div style={{width:'100%',display:'flex',alignItems:'center'}}>
        <div style={{width:6,height:6,borderRadius:'50%',border:'1.5px solid #CBD5E1',background:'white',flexShrink:0}}/>
        <div style={{flex:1,height:1.5,background:isStop?'#EF4444':'#E2E8F0',position:'relative'}}>
          {isStop && <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',width:7,height:7,borderRadius:'50%',background:'#EF4444',border:'2px solid white'}}/>}
        </div>
        <div style={{width:6,height:6,borderRadius:'50%',border:'1.5px solid #CBD5E1',background:'white',flexShrink:0}}/>
      </div>
      <span style={{fontSize:9,fontWeight:600,color:isStop?'#EF4444':'#059669'}}>
        {isStop ? `1 Stop · ${flight.stopCity} · ${flight.layover}` : 'Direct'}
      </span>
    </div>
  );
}

// ─── Baggage Chip ─────────────────────────────────────────────────────────────
function BaggageChip({baggage,withBag}) {
  const cfg = {
    none: {Icon:Ic.BagX, label:withBag?'+$25 carry-on':'No carry-on', color:'#EF4444', bg:'#FEF2F2'},
    'carry-on': {Icon:Ic.BagCheck, label:'Carry-on incl.', color:'#059669', bg:'#ECFDF5'},
    checked: {Icon:Ic.BagCheck, label:'Checked bag incl.', color:'#7C3AED', bg:'#F5F3FF'},
  }[baggage];
  return (
    <div style={{display:'flex',alignItems:'center',gap:5,background:cfg.bg,borderRadius:6,padding:'3px 8px'}}>
      <cfg.Icon s={12} c={cfg.color}/>
      <span style={{fontSize:10,fontWeight:600,color:cfg.color}}>{cfg.label}</span>
    </div>
  );
}

// ─── BEFORE Card (current Trip.com, dense + badge-confetti) ──────────────────
function BeforeCard({flight,accent}) {
  return (
    <div style={{background:'white',borderRadius:10,marginBottom:9,overflow:'hidden',border:'1px solid #F0F0F0',boxShadow:'0 1px 3px rgba(0,0,0,.07)'}}>
      <div style={{display:'flex',gap:4,padding:'7px 10px 0',flexWrap:'wrap'}}>
        {flight.recommended && <span style={{background:'#EEF3FF',color:accent,fontSize:8,padding:'2px 5px',borderRadius:4,fontWeight:700}}>✦ Trip.Best</span>}
        {flight.tag==='Cheapest' && <span style={{background:'#FEF3C7',color:'#B45309',fontSize:8,padding:'2px 5px',borderRadius:4,fontWeight:700}}>⚡ Flash Deal</span>}
        {flight.tag && <span style={{background:'#F3F4F6',color:'#6B7280',fontSize:8,padding:'2px 5px',borderRadius:4}}>{flight.tag}</span>}
        <span style={{background:'#F3F4F6',color:'#9CA3AF',fontSize:8,padding:'2px 5px',borderRadius:4}}>Trip Coins +{Math.round(flight.price*.5)}</span>
        {flight.cancellation && <span style={{background:'#ECFDF5',color:'#065F46',fontSize:8,padding:'2px 5px',borderRadius:4}}>Free Cancel</span>}
      </div>
      <div style={{padding:'8px 10px 6px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
          <span style={{fontSize:11,fontWeight:600,color:'#374151'}}>{flight.airline} · {flight.code}{flight.num} · Economy Light</span>
          <span style={{fontSize:17,fontWeight:800,color:'#111827'}}>${flight.price}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}>
          <span style={{fontSize:14,fontWeight:700}}>{flight.dep}</span>
          <div style={{flex:1,height:1,background:'#E5E7EB'}}/>
          {flight.stops>0&&<div style={{width:5,height:5,borderRadius:'50%',background:'#EF4444'}}/>}
          <span style={{fontSize:9,color:'#9CA3AF'}}>{flight.stops===0?'Direct':'1 Stop'} {flight.duration}</span>
          <div style={{flex:1,height:1,background:'#E5E7EB'}}/>
          <span style={{fontSize:14,fontWeight:700}}>{flight.arr}</span>
        </div>
        <div style={{fontSize:9,color:'#9CA3AF',marginBottom:7}}>Baggage fees may apply · taxes not included</div>
        <button style={{width:'100%',padding:'9px',background:'#EF4444',color:'white',border:'none',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer'}}>Book Now</button>
      </div>
    </div>
  );
}

// ─── AFTER Card (redesigned) ──────────────────────────────────────────────────
function AfterCard({flight,withBag,accent,onSelect,delay=0}) {
  const displayPrice = withBag&&flight.baggage==='none' ? flight.price+25 : flight.price;
  return (
    <div className="a-fsi" style={{animationDelay:`${delay}s`,background:'white',borderRadius:14,marginBottom:10,boxShadow:'0 1px 6px rgba(0,0,0,.07)',overflow:'hidden',border:flight.recommended?`1.5px solid ${accent}33`:'1.5px solid transparent'}}>
      {flight.tag && (
        <div style={{background:flight.tagColor,padding:'4px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:10,fontWeight:700,color:'white',letterSpacing:.3}}>{flight.tag}</span>
          {flight.recommended && <span style={{fontSize:9,color:'rgba(255,255,255,.8)'}}>Recommended for you</span>}
        </div>
      )}
      <div style={{padding:'12px 14px'}}>
        {/* Airline + trust */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <AirlineBadge flight={flight} size={30}/>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'#111827'}}>{flight.airline}</div>
              <div style={{fontSize:10,color:'#9CA3AF'}}>{flight.code}{flight.num} · Economy</div>
            </div>
          </div>
          {flight.cancellation && (
            <div style={{background:'#ECFDF5',borderRadius:7,padding:'3px 8px',display:'flex',alignItems:'center',gap:5}}>
              <Ic.Check s={10} c="#059669"/><span style={{fontSize:10,fontWeight:700,color:'#065F46'}}>Free Cancel</span>
            </div>
          )}
        </div>
        {/* Times + timeline */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:'#111827',letterSpacing:-.5,lineHeight:1}}>{flight.dep}</div>
            <div style={{fontSize:10,color:'#9CA3AF',marginTop:2}}>{flight.from}</div>
          </div>
          <StopTimeline flight={flight}/>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:20,fontWeight:800,color:'#111827',letterSpacing:-.5,lineHeight:1}}>{flight.arr}</div>
            <div style={{fontSize:10,color:'#9CA3AF',marginTop:2}}>{flight.to}</div>
          </div>
        </div>
        {/* Baggage + price */}

            {pct:'$0',label:'Visible baggage cost on card',sub:'Current Trip.com design — baggage fees only revealed at checkout stage',c:'rgba(255,255,255,.45)'},
          ].map((t,i)=>(
            <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'8px 10px',background:'rgba(255,255,255,.03)',borderRadius:9,borderLeft:`2px solid ${t.c}`}}>
              <div style={{fontSize:16,fontWeight:800,color:t.c,flexShrink:0,minWidth:54,letterSpacing:-.3}}>{t.pct}</div>
              <div>
                <div style={{fontWeight:600,color:'rgba(255,255,255,.72)',marginBottom:2,fontSize:16}}>{t.label}</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.3)',lineHeight:1.4}}>{t.sub}</div>
              </div>
            </div>
          ))}
        </div>
      </>,{gridRow:'1',gridColumn:'3',zIndex:1,animationDelay:'.1s'})}

      {/* C: Key findings */}
      {card(<>
        {lbl('Key Findings · Across the Booking Journey')}
        <div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
          {findings.map((f,i)=>(
            <div key={i} style={{padding:'12px',background:'rgba(255,255,255,.03)',borderRadius:10,borderTop:`1.5px solid ${f.hot?accent:'rgba(255,255,255,.09)'}`,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
              <div>
                <div style={{color:'rgba(255,255,255,.28)',fontWeight:700,textTransform:'uppercase',letterSpacing:.7,marginBottom:6,fontSize:12}}>{f.stage}</div>
                <div style={{fontWeight:700,color:f.hot?accent:'rgba(255,255,255,.8)',marginBottom:6,lineHeight:1.25,fontSize:22}}>{f.issue}</div>
              </div>
              <div style={{color:'rgba(255,255,255,.38)',lineHeight:1.45,fontSize:13}}>{f.detail}</div>
            </div>
          ))}
        </div>
      </>,{gridRow:'2',gridColumn:'2/-1',zIndex:1,animationDelay:'.12s'})}

      {/* D: Research coverage */}
      {card(<>
        {lbl('Research Coverage')}
        <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gridTemplateRows:'1fr 1fr 1fr',gap:8}}>
          {[['4','Competitors benchmarked'],['10+','UX patterns analyzed'],['85%+','Industry abandon rate'],['5','Staff interviews'],['WCAG','2.1 compliance check'],['3','Design variants explored']].map(([v,l])=>(
            <div key={l} style={{padding:'10px 12px',background:'rgba(255,255,255,.04)',borderRadius:10,display:'flex',flexDirection:'column',justifyContent:'center'}}>
              <div style={{fontSize:20,fontWeight:800,color:'white',letterSpacing:-.3,lineHeight:1}}>{v}</div>
              <div style={{color:'rgba(255,255,255,.32)',marginTop:3,lineHeight:1.3,fontSize:14}}>{l}</div>
            </div>
          ))}
        </div>
      </>,{gridRow:'3',gridColumn:'2',zIndex:1,animationDelay:'.14s'})}

      {/* E: Feature gaps */}
      {card(<>
        <div style={{color:'rgba(255,255,255,.3)',fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',marginBottom:10,flexShrink:0,fontSize:13}}>Trip.com Feature Gaps vs. Competitors</div>
        <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
          {[
            ['True Cost Baggage Toggle','Expedia & Google Flights — dynamic bag-fee display'],
            ['Visual Stop Timeline','Google Flights graphical layover representation'],
            ['Free Cancellation Hero Badge','Skyscanner green pill — most prominent card element'],
            ['Price Freeze Secondary CTA','Hopper-pioneered — 25%+ conversion lift on return'],
            ['AI-Driven Sort Personalization','No major OTA has fully shipped this — opportunity'],
          ].map(([f,n],i)=>(
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:7,padding:'4px 0',borderBottom:i<4?'1px solid rgba(255,255,255,.05)':'none'}}>
              <div style={{width:14,height:14,borderRadius:3,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.22)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>
                <Ic.X s={7} c="#EF4444"/>
              </div>
              <div>
                <div style={{fontWeight:600,color:'rgba(255,255,255,.65)',lineHeight:1.3,fontSize:13}}>{f}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.28)',marginTop:1,lineHeight:1.3}}>{n}</div>
              </div>
            </div>
          ))}
        </div>
      </>,{gridRow:'3',gridColumn:'3',zIndex:1,animationDelay:'.16s',padding:'14px 16px'})}
    </div>
  );
}

// ─── PhoneFrame ───────────────────────────────────────────────────────────────
function PhoneFrame({children,scale}) {
  return (
    <div style={{position:'relative',flexShrink:0,transform:`scale(${scale})`,transformOrigin:'center center',filter:'drop-shadow(0 28px 60px rgba(0,0,0,.6))'}}>
      <div style={{position:'absolute',inset:-11,borderRadius:54,background:'linear-gradient(145deg,#2C2C2E,#0A0A0A)',boxShadow:'inset 0 0 0 1px rgba(255,255,255,.07),0 0 0 1px rgba(0,0,0,.6)'}}/>
      <div style={{position:'absolute',left:-14,top:170,width:4,height:32,background:'#1A1A1A',borderRadius:'2px 0 0 2px'}}/>
      <div style={{position:'absolute',left:-14,top:215,width:4,height:32,background:'#1A1A1A',borderRadius:'2px 0 0 2px'}}/>
      <div style={{position:'absolute',right:-14,top:200,width:4,height:62,background:'#1A1A1A',borderRadius:'0 2px 2px 0'}}/>
      <div style={{position:'relative',borderRadius:44,overflow:'hidden',width:390,height:780,background:'#F5F7FA',display:'flex',flexDirection:'column'}}>
        {children}
      </div>
    </div>
  );
}

// ─── AnnotationCard ───────────────────────────────────────────────────────────
function AnnotationCard({title,body,research,delay}) {
  return (
    <div className="ann" style={{animationDelay:`${delay}s`}}>
      <div style={{fontSize:11,fontWeight:700,color:'#93C5FD',marginBottom:4}}>{title}</div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.7)',lineHeight:1.5,marginBottom:6}}>{body}</div>
      <div style={{fontSize:10,color:'rgba(255,255,255,.3)',lineHeight:1.4,borderTop:'1px solid rgba(255,255,255,.07)',paddingTop:5}}>📊 {research}</div>
    </div>
  );
}

// ─── TweaksPanel ──────────────────────────────────────────────────────────────
function TweaksPanel({tweaks,onUpdate,onClose}) {
  return (
    <div style={{position:'fixed',bottom:22,right:22,background:'#1A1B22',border:'1px solid rgba(255,255,255,.1)',borderRadius:16,padding:18,width:270,zIndex:1000,boxShadow:'0 20px 60px rgba(0,0,0,.55)',animation:'slideUp .3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{fontSize:13,fontWeight:700,color:'white'}}>Tweaks</span>
        <button onClick={onClose} style={{background:'none',border:'none',color:'rgba(255,255,255,.4)',cursor:'pointer',fontSize:18,lineHeight:1}}>×</button>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Accent Color</div>
        <div style={{display:'flex',gap:8}}>
          {['#1B6EFD','#7C3AED','#059669','#DC2626','#D97706'].map(c=>(
            <button key={c} onClick={()=>onUpdate({accentColor:c})} style={{width:26,height:26,borderRadius:8,background:c,border:'none',cursor:'pointer',outline:tweaks.accentColor===c?'2.5px solid white':'none',outlineOffset:2}}/>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Annotations</div>
        <button onClick={()=>onUpdate({showAnnotations:!tweaks.showAnnotations})} style={{padding:'6px 13px',borderRadius:8,border:'none',background:tweaks.showAnnotations?tweaks.accentColor:'rgba(255,255,255,.1)',color:'white',fontSize:11,cursor:'pointer',fontWeight:500}}>
          {tweaks.showAnnotations?'Visible ✓':'Hidden'}
        </button>
      </div>
    </div>
  );
}

// ─── Annotations ──────────────────────────────────────────────────────────────
const LEFT_ANNS = {
  variants:[
    {title:'Variations Over Final Answers',body:'3 design directions explored before settling — Compact, Balanced (proposed), and Expressive. Each has a distinct philosophy and target user.',research:'huashu-design principle: deliver variants, not one answer'},
    {title:'Decoy Effect in Variant Selection',body:'Compact is too sparse; Expressive risks dark-pattern perception — Balanced wins as the clear mid-tier with principled trade-offs.',research:'Behavioral econ: center-stage anchoring increases mid-option selection'},
  ],
  search:[
    {title:'True Cost Transparency',body:'"Baggage included" shown on card face — carry-on icons eliminate sticker shock at checkout.',research:'Hidden fees = #1 abandonment reason · 85%+ cart abandon rate (industry)'},
    {title:'Visual Hierarchy (Z-Pattern)',body:'Airline (TL) → Route/Time (center) → Price (BR). Whitespace 16px+ signals premium quality and reduces cognitive load.',research:'"Clutter" = top Trip.com criticism in competitive UX audit vs. Expedia'},
  ],
  'fare-select':[
    {title:'Standardized Fare Matrix',body:'Trip.com naming (Basic/Standard/Flex) replaces airline jargon. Icon-based table is 3× faster to parse than text lists.',research:'Economy Light/Saver/Classic confuse first-time users across all 4 OTAs tested'},
    {title:'Decoy Effect Anchoring',body:'"Recommended" on Standard: Basic looks too bare, Flex looks expensive — Standard wins as the natural mid-tier choice.',research:'Behavioral econ: center-stage effect increases mid-tier selection ~30%'},
  ],
  confirm:[
    {title:'All-In Price Breakdown',body:'Base + upgrade + taxes itemized. "Total includes taxes & fees" shown upfront — no checkout shock.',research:'"Price you see = price you pay" is the #1 OTA trust builder for first-time users'},
    {title:'Price Freeze Hook',body:'$15 deposit holds fare 24h — Hopper-proven pattern. Sunk cost effect drives 25%+ return booking rate.',research:'Hopper Price Freeze: converts browsers to committed payers earlier in funnel'},
  ],
};
const RIGHT_ANNS = {
  variants:[
    {title:'Anti-Slop Design System',body:'Each variant uses a coherent system: Compact → monospace/utilitarian. Balanced → whitespace/trust. Expressive → hero price/urgency.',research:'System-first: every element earns its place within the variant\'s philosophy'},
    {title:'Mobile-First Constraint',body:'All variants rendered at 390px mobile width — the primary constraint for OTA design with 60%+ mobile traffic share.',research:'OTA mobile traffic: 60%+ globally · mobile-first = thumb zone compliance'},
  ],
  search:[
    {title:'Trust Signal Layer',body:'"Verified Partner" + "Free Cancellation" + "24/7 Support" on card face — not buried in a detail view.',research:'Trust deficit = primary conversion barrier for new OTA users'},
    {title:'Low-Friction CTA',body:'"Select" replaces "Book Now" — reduces commitment anxiety for browsers not yet ready to pay.',research:'Microcopy: "Book Now" triggers early-stage browser abandonment (Expedia study)'},
  ],
  'fare-select':[
    {title:'Cost Delta Framing',body:'"+$28" not "$117" — upgrade feels like a small add-on, not a full repurchase. Loss aversion in the upsell direction.',research:'Delta framing increases upgrade acceptance vs. full-price display (behavioral econ)'},
    {title:'Risky Stop Warning',body:'"1 Stop · KUL" shown in red on timeline — flags the risk before user commits, manages boarding expectations.',research:'Short layover failures = top post-booking complaint in competitive mini-test'},
  ],
  confirm:[
    {title:'Trust Badge Row',body:'"Verified · Instant Confirmation · 24/7 Support" at the moment of highest payment anxiety.',research:'Verified badge directly counters "Trip.com phantom ticket" fear (user review analysis)'},
    {title:'CFAR Inline (not buried)',body:'"Cancel for Any Reason" presented in confirmation — not in fine print. Post-pandemic flexibility demand.',research:'Flexibility = top purchase driver post-2020 · Skyscanner badge conversion data'},
  ],
};

const STEP_INFO = {
  cover:{n:'01',label:'Project Overview'},
  variants:{n:'02',label:'Design Variants'},
  search:{n:'03',label:'Search Results Redesign'},
  'fare-select':{n:'04',label:'Fare Tier Selection'},
  confirm:{n:'05',label:'Booking Confirmation'},
};

// ─── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [screen,setScreen] = useLS('fc-portfolio-screen','cover');
  const [tweaks,setTweaks] = useState({...TWEAK_DEFAULTS});
  const [showTweaks,setShowTweaks] = useState(false);
  const [phoneScale,setPhoneScale] = useState(1);
  const [selFlight,setSelFlight] = useState(null);
  const [selTier,setSelTier] = useState(null);
  const accent = tweaks.accentColor;

  useEffect(()=>{
    const calc=()=>{
      const sh=Math.min(1,(window.innerHeight-180)/780);
      const sw=Math.min(1,(window.innerWidth-(tweaks.showAnnotations?520:60))/390);
      setPhoneScale(Math.min(sh,sw,1));
    };
    calc();window.addEventListener('resize',calc);
    return ()=>window.removeEventListener('resize',calc);
  },[tweaks.showAnnotations]);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);

  const updateTweaks=partial=>{
    const next={...tweaks,...partial};setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:next.accentColor,showAnnotations:next.showAnnotations}},'*');
  };

  const handleSelectFlight=fl=>{setSelFlight(fl);setScreen('fare-select');};
  const handleSelectTier=t=>{setSelTier(t);setScreen('confirm');};

  const leftAnns = (tweaks.showAnnotations&&LEFT_ANNS[screen])||[];
  const rightAnns = (tweaks.showAnnotations&&RIGHT_ANNS[screen])||[];
  const info = STEP_INFO[screen]||STEP_INFO.cover;
  const isFullPage = screen==='cover'||screen==='variants';

  return (
    <div style={{width:'100vw',height:'100vh',fontFamily:'Inter,sans-serif',overflow:'hidden'}}>
      {screen==='cover' && (
        <div key="cover" style={{width:'100%',height:'100%',animation:'fadeSlideIn .5s ease both',position:'relative'}}>
          <CoverScreen onStart={()=>setScreen('variants')} accent={accent}/>
          <div style={{position:'absolute',bottom:24,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8,zIndex:10}}>
            {SCREENS.map((s,i)=>(
              <button key={s} onClick={()=>setScreen(s)} style={{width:screen===s?26:8,height:8,borderRadius:4,background:screen===s?accent:'rgba(255,255,255,.15)',border:'none',cursor:'pointer',padding:0,transition:'all .3s ease'}}/>
            ))}
          </div>
        </div>
      )}

      {screen==='variants' && (
        <div key="variants" style={{width:'100%',height:'100%',animation:'fadeSlideIn .5s ease both',position:'relative'}}>
          <VariantsScreen onContinue={()=>setScreen('search')} accent={accent}/>
          <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8,zIndex:10}}>
            {SCREENS.map((s,i)=>(
              <button key={s} onClick={()=>setScreen(s)} style={{width:screen===s?26:8,height:8,borderRadius:4,background:screen===s?accent:'rgba(255,255,255,.18)',border:'none',cursor:'pointer',padding:0,transition:'all .3s ease'}}/>
            ))}
          </div>
        </div>
      )}

      {!isFullPage && (
        <div key="proto" style={{display:'flex',flexDirection:'column',alignItems:'center',width:'100%',height:'100%',animation:'fadeSlideIn .4s ease both'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,marginTop:16,flexShrink:0}}>
            <div style={{background:'rgba(255,255,255,.05)',borderRadius:20,padding:'3px 11px',fontSize:10,color:'rgba(255,255,255,.4)',fontWeight:500}}>UX Design Portfolio</div>
            <div style={{width:3,height:3,borderRadius:'50%',background:'rgba(255,255,255,.15)'}}/>
            <div style={{background:'rgba(255,255,255,.05)',borderRadius:20,padding:'3px 11px',fontSize:10,color:'rgba(255,255,255,.4)',fontWeight:500}}>Flight Fare Card · Trip.com</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:24,width:'100%',maxWidth:1100,padding:'0 16px',flex:1,justifyContent:'center'}}>
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:12,alignItems:'flex-end',minWidth:180}}>
              {leftAnns.map((a,i)=><AnnotationCard key={i} {...a} delay={.08+i*.1}/>)}
            </div>
            <PhoneFrame scale={phoneScale}>
              {screen==='search' && <SearchScreen onSelectFlight={handleSelectFlight} accent={accent}/>}
              {screen==='fare-select' && <FareSelectScreen flight={selFlight||FLIGHTS[0]} onBack={()=>setScreen('search')} onSelect={handleSelectTier} accent={accent}/>}
              {screen==='confirm' && <ConfirmScreen flight={selFlight||FLIGHTS[0]} tier={selTier||FARE_TIERS[1]} onRestart={()=>{setScreen('cover');setSelFlight(null);setSelTier(null);}} accent={accent}/>}
            </PhoneFrame>
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:12,alignItems:'flex-start',minWidth:180}}>
              {rightAnns.map((a,i)=><AnnotationCard key={i} {...a} delay={.12+i*.1}/>)}
            </div>
          </div>
          <div style={{marginBottom:16,display:'flex',flexDirection:'column',alignItems:'center',gap:7,flexShrink:0}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {SCREENS.map(s=>(
                <button key={s} onClick={()=>setScreen(s)} style={{width:screen===s?26:8,height:8,borderRadius:4,background:screen===s?accent:'rgba(255,255,255,.18)',border:'none',cursor:'pointer',padding:0,transition:'all .3s ease'}}/>
              ))}
              <span style={{fontSize:10,color:accent,fontWeight:600,marginLeft:6}}>{info.n} / 05 · {info.label}</span>
            </div>
            <div key={screen} style={{fontSize:11,color:'rgba(255,255,255,.3)',textAlign:'center',maxWidth:440,lineHeight:1.55,animation:'fadeSlideIn .4s ease both'}}>
              {screen==='search'&&'Toggle Before / After · Enable "+ Carry-on" for True Cost view · Tap any card to explore fare selection'}
              {screen==='fare-select'&&'Compare Basic / Standard / Flex · Decoy Effect in action · Toggle Price Freeze add-on'}
              {screen==='confirm'&&'All-in price breakdown · Trust badge row · CFAR add-on surfaced inline — not buried'}
            </div>
          </div>
        </div>
      )}
      {showTweaks&&<TweaksPanel tweaks={tweaks} onUpdate={updateTweaks} onClose={()=>setShowTweaks(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
